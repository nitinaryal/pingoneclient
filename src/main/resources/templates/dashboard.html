<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard - PingOne OIDC Test Client</title>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
<main class="container">
    <header class="page-header">
        <div>
            <h1>Dashboard</h1>
            <p class="subtitle">Authenticated as <strong sec:authentication="name">user</strong></p>
        </div>
        <a class="btn btn-link" th:href="@{/}">Home</a>
    </header>

    <div class="card">
        <h2>Authentication Actions</h2>
        <div class="actions">
            <a class="btn btn-primary" th:href="@{/oauth2/authorization/pingone}">Login</a>
            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-secondary">Logout (PingOne end session)</button>
            </form>
        </div>
    </div>

    <div class="card">
        <h2>OIDC Validation</h2>
        <div class="actions">
            <a class="btn" th:href="@{/me}">View Claims (/me)</a>
            <a class="btn" th:href="@{/token}">View Token (/token)</a>
            <a class="btn" th:href="@{/jwks}">View JWKS (/jwks)</a>
            <a class="btn" th:href="@{/metadata}">View Metadata (/metadata)</a>
        </div>
    </div>
</main>
</body>
</html>
